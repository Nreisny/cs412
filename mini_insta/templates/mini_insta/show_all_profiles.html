{% extends 'mini_insta/base.html' %} {% block content %}
<div>
  {% for profile in profiles %}

  <p>Display Name: {{ profile.display_name }}</p>
  <a href="{%url 'show_profile' profile.pk%}">

  </a>
  {% endfor %}
</div>
{% endblock %}
