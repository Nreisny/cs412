Description: Simple template that dispalys all photos for a 
             given post along side its caption and timestamp
-->

{% extends 'mini_insta/base.html' %} {% block content %}
<div class="post_container">
  {% for photo in post.get_all_photos %}
  <img src="{{photo.get_image_url}}" alt="No Image" />
  {% endfor %}

  <p>{{post.caption}}</p>
  <p>{{post.timestamp}}</p>

  <a href="{%  url 'delete_post' post.pk %}">
    <button type="button" name="delete_post" value="Delete post">Delete Post</button>
  </a>

  <a href="{%  url 'update_post' post.pk %}">
    <button type="button" name="update_post" value="Update Post">Update Post</button>
  </a>
  
</div>
{% endblock %}
