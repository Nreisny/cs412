Description: Simple template that dispalys all photos for a 
             given post along side its caption and timestamp
-->

{% extends 'mini_insta/base.html' %} {% block content %}
<div class="post_container">
  {% for photo in post.get_all_photos %}
  <img src="{{photo.get_image_url}}" alt="No Image" />
  {% endfor %}

  <p>{{post.caption}}</p>
  <p>{{post.timestamp}}</p>
</div>
{% endblock %}
