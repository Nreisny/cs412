{% extends 'bookreview/base.html' %}

{% block content %}

{% for character in characters %}
    <a href="{% url 'show_character' character.pk %}">
        <div>
            <h2>{{ character.name }}</h2>

            <img src="{{ character.character_image_url }}" />

            <p>Rating: {{ character.rating }}</p>
            <p>Book: {{ character.book.name }}</p>
        </div>
    </a>

    <hr>
{% endfor %}

{% endblock %}
