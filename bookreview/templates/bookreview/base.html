{% load static %}

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Review</title>
    <link rel="stylesheet" href="{% static 'style-bookreview.css' %}" />
  </head>
  <body>
    <nav id="sidebar">
      <h2>Book Review</h2>

      <ul>
        <li>
          <a href="{% url 'show_all_profiles' %}"> Show Profiles </a>
        </li>

        <li>
          <a href="{% url 'show_all_books' %}"> Show Books </a>
        </li>

        <li>
          <a href="{% url 'show_all_characters' %}"> Show Characters </a>
        </li>
        {% if request.user.is_authenticated %}

        <li>
          <a href="{% url 'my_profile' %}">My Profile</a>
        </li>

        <li>
          <form action="{% url 'logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="sidebar-link-btn">Logout</button>
          </form>
        </li>

        {% else %}

        <li>
          <a href="{% url 'login' %}">Login</a>
        </li>

        <li>
          <a href="{% url 'create_profile' %}">Create Account</a>
        </li>

        {% endif %}
      </ul>
    </nav>

    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
