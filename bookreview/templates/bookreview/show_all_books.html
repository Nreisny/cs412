{% extends 'bookreview/base.html' %}

{% block content %}
<div class="book-grid">
    {% for book in books %}
        <a href="{% url 'show_book' book.pk %}" class="book-card">
            <h2>{{ book.name }}</h2>
            <img src="{{ book.book_image_url }}" />

            <p class="author">Author: {{ book.author }}</p>
            <p class="rating">Rating: {{ book.rating }}</p>
        </a>
    {% endfor %}
</div>
{% endblock %}
