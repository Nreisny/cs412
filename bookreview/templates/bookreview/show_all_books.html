{% extends 'bookreview/base.html' %} {% block content %}
<div class="book-grid">
  <!-- Creating a link card that displays a books image, author, and rating for each book in a given queryset -->
  {% for book in books %}
  <a href="{% url 'show_book' book.pk request.path|slice:'1:'%}" class="book-card">
    <h2>{{ book.name }}</h2>
    <img src="{{ book.book_image_url }}" />

    <p class="author">Author: {{ book.author }}</p>
    <p class="rating">Rating: {{ book.rating }}</p>
  </a>
  {% endfor %}
</div>
{% endblock %}
