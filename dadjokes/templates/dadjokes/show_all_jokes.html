{% extends 'dadjokes/base.html' %} {% block content %}

<h2>All Jokes</h2>

<!-- Loops through all jokes in context to display joke and name-->
{% for joke in jokes %}
<div class="joke-card">
  <p>{{ joke.joke }}</p>
  <p>by {{joke.name}}</p>
  <hr />
</div>
{% endfor %} {% endblock %}
