{% extends 'dadjokes/base.html' %} {% block content %}

<h2>All Pictures</h2>

<!-- goes through all pictures in context and displays image -->
{% for picture in pictures %}
<div class="picture-card">
  <img src="{{ picture.image_url }}" alt="Picture {{ picture.pk }}" />
  <p>from {{picture.name}}</p>
  </hr>
</div>
{% endfor %} {% endblock %}
