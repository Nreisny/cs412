{% extends 'dadjokes/base.html' %} {% block content %}

<!-- Showing the joke -->
<h2>Random Joke</h2>
<p>{{ joke.joke }}</p>
<p>Submitted by {{ joke.name }}</p>

<hr />

<!-- Showing the picture -->
<h2>Random Picture</h2>
<img src="{{ picture.image_url }}" width="400" />
<p>Submitted by {{ picture.name }}</p>

{% endblock %}
